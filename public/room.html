<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dimle Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: #14141f;
      border-bottom: 1px solid #1e1e2e;
    }
    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #7c5cff, #00c6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .room-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: #888;
    }
    .room-code {
      background: #1e1e2e;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.95rem;
      color: #aaa;
    }
    #userCount { color: #7c5cff; }
    .participants-btn {
      cursor: pointer;
      user-select: none;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      transition: background 0.15s;
      position: relative;
    }
    .participants-btn:hover { background: #1e1e2e; }
    .participants-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #14141f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.75rem;
      min-width: 160px;
      max-width: 220px;
      z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .participants-panel.open { display: block; }
    .participants-panel h4 {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .participant-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0;
      font-size: 0.9rem;
      color: #ccc;
    }
    .participant-item .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .participant-item.is-self { color: #7c5cff; font-weight: 600; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    /* Drag-over overlay */
    #messages.drag-over::after {
      content: "Drop to send";
      position: fixed;
      inset: 0;
      background: rgba(124, 92, 255, 0.18);
      border: 3px dashed #7c5cff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 600;
      color: #a78bfa;
      pointer-events: none;
      z-index: 200;
      border-radius: 4px;
    }
    .msg {
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .msg-user { align-self: flex-start; }
    .msg-user .name { color: #7c5cff; font-weight: 600; font-size: 0.8rem; margin-bottom: 0.15rem; }
    .msg-user .bubble {
      background: #14141f;
      border: 1px solid #1e1e2e;
      padding: 0.5rem 0.85rem;
      border-radius: 0 10px 10px 10px;
    }
    .msg-self { align-self: flex-end; }
    .msg-self .name { text-align: right; color: #00c6ff; font-weight: 600; font-size: 0.8rem; margin-bottom: 0.15rem; }
    .msg-self .bubble {
      background: #1a1a3a;
      border: 1px solid #2a2a5a;
      padding: 0.5rem 0.85rem;
      border-radius: 10px 0 10px 10px;
    }
    .msg-system {
      align-self: center;
      color: #555;
      font-size: 0.8rem;
      padding: 0.25rem 0;
    }
    /* Image bubbles */
    .bubble img {
      max-width: 280px;
      max-height: 300px;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
    /* File card */
    .file-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 200px;
      max-width: 280px;
    }
    .file-card .file-icon { font-size: 2rem; flex-shrink: 0; line-height: 1; }
    .file-card .file-meta { flex: 1; min-width: 0; }
    .file-card .file-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-card .file-size { font-size: 0.78rem; color: #888; margin-top: 0.1rem; }
    .file-card .file-dl {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #2a2a4a;
      display: flex; align-items: center; justify-content: center;
      color: #a78bfa;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.15s;
    }
    .file-card .file-dl:hover { background: #3a3a6a; }
    /* Uploading state */
    .uploading-indicator { color: #888; font-size: 0.88rem; font-style: italic; }

    /* Input bar */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: #14141f;
      border-top: 1px solid #1e1e2e;
    }
    #msgInput {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }
    #msgInput:focus { border-color: #7c5cff; }
    #sendBtn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c5cff, #5a3de8);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #sendBtn:hover { opacity: 0.85; }
    #attachBtn {
      flex-shrink: 0;
      width: 42px; height: 42px;
      border: 1px solid #3a3a55;
      border-radius: 8px;
      background: #2a2a3d;
      color: #a78bfa;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #attachBtn:hover { background: #3a3a55; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: #14141f;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 2rem;
      width: 90%;
      max-width: 340px;
      text-align: center;
    }
    .modal h2 { margin-bottom: 0.5rem; font-size: 1.2rem; }
    .modal p { color: #666; font-size: 0.85rem; margin-bottom: 1.25rem; }
    .modal input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      background: #0a0a0f;
      color: #e0e0e0;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 0.75rem;
      outline: none;
    }
    .modal input:focus { border-color: #7c5cff; }
    .modal button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c5cff, #5a3de8);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    .modal button:hover { opacity: 0.85; }
    #joinError { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 300;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  </style>
</head>
<body>

  <!-- Username modal -->
  <div class="modal-overlay" id="usernameModal">
    <div class="modal">
      <h2>Pick a username</h2>
      <p>This is how others will see you</p>
      <input type="text" id="usernameInput" maxlength="20">
      <input type="password" id="passwordInput" placeholder="Room password (if any)">
      <button id="usernameBtn">Join Chat</button>
      <p id="joinError"></p>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox"><img id="lightboxImg" src="" alt=""></div>

  <header>
    <a href="/" class="logo">Dimle</a>
    <div class="room-info">
      <span>Room <span class="room-code" id="roomCode"></span></span>
      <span class="participants-btn" id="participantsBtn" title="View participants">
        <span id="userCount">0</span> online
        <div class="participants-panel" id="participantsPanel">
          <h4>Participants</h4>
          <div id="participantsList"></div>
        </div>
      </span>
    </div>
  </header>

  <div id="messages"></div>

  <div class="input-bar">
    <input type="file" id="fileInput" accept="*/*" style="display:none;">
    <button id="attachBtn" title="Attach file">📎</button>
    <input type="text" id="msgInput" placeholder="Type a message…" autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Init ──────────────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get("id");
    if (!roomId || !/^\d{4}$/.test(roomId)) window.location.href = "/";

    document.getElementById("roomCode").textContent = roomId;

    const defaultName    = "User_" + Math.floor(10 + Math.random() * 90);
    const usernameInput  = document.getElementById("usernameInput");
    usernameInput.value  = defaultName;
    usernameInput.select();

    let username = null;
    const socket   = io();
    const messages = document.getElementById("messages");
    const msgInput = document.getElementById("msgInput");

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(s = "") {
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    function fmtSize(bytes) {
      if (!bytes) return "";
      return bytes >= 1_048_576
        ? `${(bytes / 1_048_576).toFixed(1)} MB`
        : `${Math.max(1, Math.round(bytes / 1024))} KB`;
    }

    function fileIcon(mime = "", name = "") {
      if (mime.startsWith("image/"))       return "🖼️";
      if (mime.startsWith("video/"))       return "🎬";
      if (mime.startsWith("audio/"))       return "🎵";
      if (mime === "application/pdf")      return "📕";
      if (/zip|rar|7z|tar|gz/.test(mime)) return "📦";
      if (mime.startsWith("text/"))        return "📄";
      const ext = name.split(".").pop().toLowerCase();
      if (["doc","docx"].includes(ext))    return "📝";
      if (["xls","xlsx"].includes(ext))    return "📊";
      if (["ppt","pptx"].includes(ext))    return "📊";
      return "📎";
    }

    function linkify(text) {
      const escaped = esc(text);
      return escaped.replace(
        /(?<![="'\/\w])((?:https?:\/\/|www\.)?[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(?:\/[^\s<]*)?)/g,
        (match) => {
          const href = /^https?:\/\//i.test(match) ? match : "https://" + match;
          return `<a href="${href}" target="_blank" rel="noopener" style="color:#818cf8;text-decoration:underline;">${match}</a>`;
        }
      );
    }

    function addMessage(el) {
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }

    function makeMsg(sender, bubbleHtml) {
      const isSelf = sender === username;
      const div = document.createElement("div");
      div.className = `msg ${isSelf ? "msg-self" : "msg-user"}`;
      div.innerHTML = `<div class="name">${esc(sender)}</div><div class="bubble">${bubbleHtml}</div>`;
      return div;
    }

    // Render a file bubble (image = inline, other = card)
    function renderFile(sender, { url, name, size, mime }) {
      let bubble;
      if (mime && mime.startsWith("image/")) {
        bubble = `<img src="${esc(url)}" alt="${esc(name)}" data-lightbox>`;
      } else {
        bubble = `<div class="file-card">
          <div class="file-icon">${fileIcon(mime, name)}</div>
          <div class="file-meta">
            <div class="file-name">${esc(name)}</div>
            <div class="file-size">${fmtSize(size)}</div>
          </div>
          <a class="file-dl" href="${esc(url)}" download="${esc(name)}" title="Download">⬇</a>
        </div>`;
      }
      return makeMsg(sender, bubble);
    }

    // Render legacy base64 image
    function renderLegacyImage(sender, dataUrl) {
      return makeMsg(sender, `<img src="${dataUrl}" alt="image" data-lightbox>`);
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────
    const lightbox    = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");

    messages.addEventListener("click", (e) => {
      const img = e.target.closest("[data-lightbox]");
      if (!img) return;
      lightboxImg.src = img.src;
      lightbox.classList.add("open");
    });
    lightbox.addEventListener("click", () => lightbox.classList.remove("open"));

    // ── Join ──────────────────────────────────────────────────────────────────
    function joinRoom() {
      username = usernameInput.value.trim() || defaultName;
      const password = document.getElementById("passwordInput").value;
      socket.emit("join-room", { roomId, username, password });
    }

    socket.on("room-info", () => {
      document.getElementById("usernameModal").style.display = "none";
      msgInput.focus();
    });

    socket.on("join-error", (msg) => {
      document.getElementById("joinError").textContent = msg;
      username = null;
    });

    document.getElementById("usernameBtn").addEventListener("click", joinRoom);
    usernameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") joinRoom(); });

    // ── History ───────────────────────────────────────────────────────────────
    socket.on("chat-history", (history) => {
      const sep = document.createElement("div");
      sep.className = "msg msg-system";
      sep.textContent = `— ${history.length} earlier message${history.length !== 1 ? "s" : ""} —`;
      addMessage(sep);
      history.forEach(entry => {
        if (entry.type === "message") {
          addMessage(makeMsg(entry.username, linkify(entry.message)));
        } else if (entry.type === "file") {
          addMessage(renderFile(entry.username, entry));
        } else if (entry.type === "image") {
          addMessage(renderLegacyImage(entry.username, entry.dataUrl));
        }
      });
    });

    // ── Incoming messages ─────────────────────────────────────────────────────
    socket.on("chat-message", ({ username: sender, message }) => {
      addMessage(makeMsg(sender, linkify(message)));
    });

    socket.on("chat-file", ({ username: sender, url, name, size, mime }) => {
      if (sender === username) return; // already shown optimistically
      addMessage(renderFile(sender, { url, name, size, mime }));
    });

    socket.on("chat-image", ({ username: sender, dataUrl }) => {
      if (sender === username) return;
      addMessage(renderLegacyImage(sender, dataUrl));
    });

    socket.on("system-message", (text) => {
      const div = document.createElement("div");
      div.className = "msg msg-system";
      div.textContent = text;
      addMessage(div);
    });

    socket.on("user-count", (count) => {
      document.getElementById("userCount").textContent = count;
    });

    socket.on("user-list", (users) => {
      document.getElementById("participantsList").innerHTML = users.map(name => {
        const isSelf = name === username;
        return `<div class="participant-item${isSelf ? " is-self" : ""}">
          <span class="dot"></span><span>${esc(name)}${isSelf ? " (you)" : ""}</span>
        </div>`;
      }).join("");
    });

    // ── Participants panel ────────────────────────────────────────────────────
    const participantsBtn   = document.getElementById("participantsBtn");
    const participantsPanel = document.getElementById("participantsPanel");
    participantsBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      participantsPanel.classList.toggle("open");
    });
    document.addEventListener("click", () => participantsPanel.classList.remove("open"));

    // ── Send text ─────────────────────────────────────────────────────────────
    function sendMessage() {
      const message = msgInput.value.trim();
      if (!message || !username) return;
      socket.emit("send-message", { roomId, message });
      msgInput.value = "";
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

    // ── Upload file ───────────────────────────────────────────────────────────
    async function uploadFile(file) {
      if (!username || !file) return;

      // Optimistic: show uploading indicator
      const tempDiv = document.createElement("div");
      tempDiv.className = "msg msg-self";
      tempDiv.innerHTML = `<div class="name">${esc(username)}</div>
        <div class="bubble"><span class="uploading-indicator">📎 Uploading ${esc(file.name)}…</span></div>`;
      addMessage(tempDiv);

      try {
        const form = new FormData();
        form.append("file", file);
        const resp = await fetch("/api/upload", { method: "POST", body: form });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        // Remove uploading indicator, show real bubble
        tempDiv.remove();
        addMessage(renderFile(username, data));

        // Tell everyone else
        socket.emit("send-file", { roomId, url: data.url, name: data.name, size: data.size, mime: data.mime });
      } catch (err) {
        tempDiv.querySelector(".bubble").innerHTML = `<span style="color:#f87171">❌ Upload failed: ${esc(file.name)}</span>`;
        console.error("Upload error:", err);
      }
    }

    // File picker button
    document.getElementById("attachBtn").addEventListener("click", () => {
      document.getElementById("fileInput").click();
    });
    document.getElementById("fileInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) uploadFile(file);
      e.target.value = "";
    });

    // Drag & drop onto the message area
    messages.addEventListener("dragover", (e) => {
      e.preventDefault();
      messages.classList.add("drag-over");
    });
    messages.addEventListener("dragleave", (e) => {
      if (!messages.contains(e.relatedTarget)) messages.classList.remove("drag-over");
    });
    messages.addEventListener("drop", (e) => {
      e.preventDefault();
      messages.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });

    // Paste (images from clipboard)
    document.addEventListener("paste", (e) => {
      if (!username) return;
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (const item of items) {
        if (item.kind === "file") {
          e.preventDefault();
          uploadFile(item.getAsFile());
          break;
        }
      }
    });
  </script>
</body>
</html>
